<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 60" fill="none">
  <!-- Outer tyre ring -->
  <circle cx="30" cy="30" r="26" stroke="#F97316" stroke-width="8" fill="none"/>
  <!-- Inner rim -->
  <circle cx="30" cy="30" r="14" stroke="#F97316" stroke-width="3" fill="none"/>
  <!-- Hub center -->
