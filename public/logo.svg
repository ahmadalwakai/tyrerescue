<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 60" fill="none">
  <!-- Outer tyre ring -->
  <circle cx="30" cy="30" r="26" stroke="#F97316" stroke-width="8" fill="none"/>
  <!-- Inner rim -->
  <circle cx="30" cy="30" r="14" stroke="#F97316" stroke-width="3" fill="none"/>
  <!-- Hub center -->
  <circle cx="30" cy="30" r="4" fill="#F97316"/>
  <!-- 5 spokes -->
  <line x1="30" y1="30" x2="30" y2="16" stroke="#F97316" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="30" y1="30" x2="43" y2="22" stroke="#F97316" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="30" y1="30" x2="43" y2="38" stroke="#F97316" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="30" y1="30" x2="17" y2="38" stroke="#F97316" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="30" y1="30" x2="17" y2="22" stroke="#F97316" stroke-width="2.5" stroke-linecap="round"/>
  <!-- TYRE text -->
  <text x="68" y="24" font-family="'Bebas Neue', sans-serif" font-size="28" fill="#FAFAFA" letter-spacing="2">TYRE</text>
  <!-- RESCUE text -->
  <text x="68" y="52" font-family="'Bebas Neue', sans-serif" font-size="28" fill="#F97316" letter-spacing="2">RESCUE</text>
</svg>
